<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        body {
            background-image: url('Images/Snake\ Wallpaper.jpg');
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
        }
        /*this creates a blurred overlay on top of the background image*/
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            /* This blurs the background for better focus on the game */
            filter: blur(8px);
            z-index: -1;
            /*this allows clicks to pass through it*/
            pointer-events: none;
        }
        h2 {
            text-align: center;
            color: white;
        }
        canvas {
            background: rgb(10, 1, 1);
            display: block;
            margin: auto;
            border: 2px solid whitesmoke;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border-radius: 60px;
            font-size: 15px;
        }
        button :hover {
            background-color: rgb(3, 73, 3);
        }

        #btnContainer {
            position: fixed;    
            top: 20px;           
            right: 30px;         
            border: 2px solid #333;
            padding: 10px;
            display: flex;
            flex-direction: column; 
            gap: 10px;              
            background: rgba(255, 255, 255, 0.2); 
            z-index: 1000;
        }

        #btnContainer button {
            width: 100%;
            background-color: rgb(25, 115, 17);
        }

        #btnContainer button:hover {
            background-color: #f5f6a6;
        }
    </style>
</head>
<body>
    <h2>Snake Game</h2>
    <canvas id="game" width="500" height="500"></canvas>
    <div id="btnContainer">
        <button id="restartBtn">Restart</button>
        <button id="slowBtn">Slow</button>
        <button id="normalBtn">Normal</button>
        <button id="fastBtn">Fast</button>
    </div>
    <script src="snake.js"></script>
</body>
</html>
